name: "Genesis: PR Opened"

on:
  pull_request_target:
    types: [opened]
    branches: [master]

jobs:
  select-targets:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR=${{ github.event.pull_request.user.login }}
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          if echo "$CHANGED" | grep -qE '^\.github/workflows/genesis-'; then
            if [ "$AUTHOR" != "sorpaas" ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body \
                "**JAR Bot:** This PR modifies protected genesis files (workflows or cache). Only the founder (sorpaas) may modify these. Genesis scoring is disabled for this PR."
              exit 1
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-genesis-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build genesis tools
        working-directory: spec
        run: lake build genesis_select_targets

      - name: Select comparison targets
        working-directory: spec
        run: |
          git fetch origin genesis-state
          CACHE=$(git show origin/genesis-state:genesis.json)
          PR_ID=${{ github.event.pull_request.number }}
          PR_CREATED_AT="${{ github.event.pull_request.created_at }}"
          PR_CREATED_EPOCH=$(date -d "$PR_CREATED_AT" +%s)
          echo "{\"prId\":${PR_ID},\"prCreatedAt\":${PR_CREATED_EPOCH},\"indices\":${CACHE}}" | \
            .lake/build/bin/genesis_select_targets > /tmp/targets.json

      - name: Post review template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGETS=$(cat /tmp/targets.json | jq -r '.targets[]' 2>/dev/null || true)
          PR_ID=${{ github.event.pull_request.number }}

          if [ -z "$TARGETS" ]; then
            TARGETS_LIST="*(no comparison targets — this is the first scored commit)*"
          else
            TARGETS_LIST=""
            for t in $TARGETS; do
              SHORT=$(echo "$t" | cut -c1-8)
              TARGETS_LIST="${TARGETS_LIST}\n- \`${SHORT}\` (${t})"
            done
          fi

          BODY=$(cat <<'TEMPLATE'
          ## Genesis Review

          **Comparison targets:**
          TARGETS_PLACEHOLDER

          ### How to review

          Post a comment with the following format (rank from best to worst):

          ```
          /review
          difficulty: <commit1>, <commit2>, ..., <commitN>, currentPR
          novelty: <commit1>, <commit2>, ..., <commitN>, currentPR
          design: <commit1>, <commit2>, ..., <commitN>, currentPR
          verdict: merge
          ```

          Use the short commit hashes above and `currentPR` for this PR.
          Each line ranks all comparison targets + this PR from best to worst.

          To meta-review another reviewer's comment, react with 👍 or 👎.
          TEMPLATE
          )

          BODY=$(echo "$BODY" | sed "s|TARGETS_PLACEHOLDER|${TARGETS_LIST}|")
          gh pr comment "$PR_ID" --body "$BODY"
