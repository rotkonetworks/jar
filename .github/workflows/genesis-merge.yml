name: "Genesis: Merge"

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: number

concurrency:
  group: genesis-merge
  cancel-in-progress: false

jobs:
  merge:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.issue.pull_request &&
       github.event.comment.body == '/merge' &&
       github.event.comment.user.login == 'sorpaas')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR number and base branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER=${{ inputs.pr_number }}
          else
            PR_NUMBER=${{ github.event.issue.number }}
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          BASE=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json baseRefName --jq '.baseRefName')
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.base }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_AUTHOR=$(gh pr view ${{ steps.pr-info.outputs.pr_number }} --json author --jq '.author.login')
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ steps.pr-info.outputs.pr_number }}/files --paginate --jq '.[].filename')
          if echo "$CHANGED" | grep -qE '^\.github/workflows/genesis-'; then
            if [ "$PR_AUTHOR" != "sorpaas" ]; then
              gh pr comment ${{ steps.pr-info.outputs.pr_number }} --body \
                "**JAR Bot:** Cannot merge — this PR modifies protected genesis files. Only the founder (sorpaas) may modify these."
              exit 1
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-genesis-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build genesis tools
        working-directory: spec
        run: lake build genesis_select_targets genesis_evaluate genesis_ranking

      - name: Collect reviews and evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: spec
        run: |
          PR_NUMBER=${{ steps.pr-info.outputs.pr_number }}

          # Read cache from genesis-state branch
          git fetch origin genesis-state
          CACHE=$(git show origin/genesis-state:genesis.json)
          RANKING=$(git show origin/genesis-state:ranking.json 2>/dev/null || echo '{}')

          # Get PR details (including immutable created_at for target anchoring)
          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefOid,author,createdAt,body)
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          PR_CREATED_AT=$(echo "$PR_JSON" | jq -r '.createdAt')
          PR_CREATED_EPOCH=$(date -d "$PR_CREATED_AT" +%s)
          PR_BODY=$(echo "$PR_JSON" | jq -r '.body // ""')

          # Parse accepted flags from leading lines of PR body (before first blank line).
          # To add new flags, add a new parse_flag call below.
          parse_flag() {
            local flag="$1"
            echo "$PR_BODY" | awk '/^$/{exit} /^'"$flag"':/{print; exit}' | sed "s/^${flag}: *@\\{0,1\\}//"
          }

          GENESIS_AUTHOR=$(parse_flag "Set-Genesis-Author")
          if [ -n "$GENESIS_AUTHOR" ]; then
            AUTHOR="$GENESIS_AUTHOR"
          fi

          # Get comparison targets anchored to PR creation time
          RANKING_SNAPSHOT=$(echo "$CACHE" | jq -c --argjson epoch "$PR_CREATED_EPOCH" --argjson ranking "$RANKING" '
            [.[] | select(.epoch < $epoch)] | last | .commitHash // empty |
            . as $hash | $ranking[$hash] // empty
          ')
          if [ -z "$RANKING_SNAPSHOT" ] || [ "$RANKING_SNAPSHOT" = "null" ]; then
            RANKING_SNAPSHOT="null"
          fi
          INPUT=$(jq -n \
            --argjson prId "$PR_NUMBER" \
            --argjson prCreatedAt "$PR_CREATED_EPOCH" \
            --argjson indices "$CACHE" \
            --argjson ranking "$RANKING_SNAPSHOT" \
            'if $ranking == null then {prId: $prId, prCreatedAt: $prCreatedAt, indices: $indices}
             else {prId: $prId, prCreatedAt: $prCreatedAt, indices: $indices, ranking: $ranking} end')
          TARGETS_JSON=$(echo "$INPUT" | .lake/build/bin/genesis_select_targets)
          TARGETS=$(echo "$TARGETS_JSON" | jq -c '.targets')

          # Collect reviews + meta-reviews (expand currentPR + short hashes)
          COLLECTED=$(bash tools/genesis-collect-reviews.sh "$PR_NUMBER" "$HEAD_SHA" "$TARGETS")
          REVIEWS=$(echo "$COLLECTED" | jq '.reviews')
          META_REVIEWS=$(echo "$COLLECTED" | jq '.metaReviews')

          # Build signed commit
          EPOCH=$(date +%s)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FOUNDER_OVERRIDE=false
          else
            FOUNDER_OVERRIDE=true
          fi
          COMMIT_JSON=$(jq -n \
            --arg id "$HEAD_SHA" \
            --argjson prId "$PR_NUMBER" \
            --arg author "$AUTHOR" \
            --argjson mergeEpoch "$EPOCH" \
            --argjson prCreatedAt "$PR_CREATED_EPOCH" \
            --argjson targets "$TARGETS" \
            --argjson reviews "$REVIEWS" \
            --argjson metaReviews "$META_REVIEWS" \
            --argjson founderOverride "$FOUNDER_OVERRIDE" \
            '{id: $id, prId: $prId, author: $author, mergeEpoch: $mergeEpoch,
              prCreatedAt: $prCreatedAt, comparisonTargets: $targets, reviews: $reviews,
              metaReviews: $metaReviews, founderOverride: $founderOverride}')

          # Evaluate
          INPUT=$(jq -n \
            --argjson commit "$COMMIT_JSON" \
            --argjson pastIndices "$CACHE" \
            '{commit: $commit, pastIndices: $pastIndices}')

          INDEX=$(echo "$INPUT" | .lake/build/bin/genesis_evaluate)

          SCORE=$(echo "$INDEX" | jq -c '.score')
          WEIGHT_DELTA=$(echo "$INDEX" | jq -r '.weightDelta')

          # Save for merge step
          echo "$INDEX" > /tmp/genesis_index.json
          echo "$COMMIT_JSON" > /tmp/genesis_commit.json
          echo "$CACHE" > /tmp/genesis_cache.json

      - name: Wait for checks and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr-info.outputs.pr_number }}
          INDEX=$(cat /tmp/genesis_index.json)
          COMMIT_DATA=$(cat /tmp/genesis_commit.json)
          AUTHOR=$(echo "$COMMIT_DATA" | jq -r '.author')
          SCORE=$(echo "$INDEX" | jq -c '.score')
          WEIGHT_DELTA=$(echo "$INDEX" | jq -r '.weightDelta')

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MERGE_TYPE="quorum reached"
          else
            MERGE_TYPE="founder override"
          fi

          # Wait for required checks to pass
          gh pr checks "$PR_NUMBER" --watch --fail-fast || {
            gh pr comment "$PR_NUMBER" --body \
              "**JAR Bot:** Checks failed — cannot merge (${MERGE_TYPE})."
            exit 1
          }

          # Merge synchronously
          gh pr merge "$PR_NUMBER" --merge --subject "Merge PR #${PR_NUMBER}

          Genesis-Commit: $(echo "$COMMIT_DATA" | jq -c .)
          Genesis-Index: $(echo "$INDEX" | jq -c .)
          Genesis-PR: #${PR_NUMBER}
          Genesis-Author: ${AUTHOR}"

          # Confirm merge actually happened
          STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "ERROR: PR #$PR_NUMBER not merged (state: $STATE)" >&2
            gh pr comment "$PR_NUMBER" --body \
              "**JAR Bot:** Merge failed unexpectedly (state: ${STATE})."
            exit 1
          fi

          gh pr comment "$PR_NUMBER" --body \
            "**JAR Bot:** Merged (${MERGE_TYPE}).
            Score: ${SCORE}
            Weight delta: ${WEIGHT_DELTA}"

      - name: Update genesis-state cache
        working-directory: spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr-info.outputs.pr_number }}
          INDEX=$(cat /tmp/genesis_index.json)

          # Update genesis.json
          CACHE=$(cat /tmp/genesis_cache.json 2>/dev/null || git show origin/genesis-state:genesis.json)
          UPDATED_CACHE=$(echo "$CACHE" | jq --argjson idx "$INDEX" '. + [$idx]')

          # Compute updated ranking from all SignedCommits in git history
          GENESIS_COMMIT=$(grep 'def genesisCommit' Genesis/State.lean | grep -oP '"[0-9a-f]{40}"' | tr -d '"')
          git pull origin master --ff-only
          SIGNED_COMMITS="[]"
          for MERGE_HASH in $(git log --merges --reverse --format="%H" "${GENESIS_COMMIT}..HEAD"); do
            COMMIT_LINE=$(git log -1 --format="%B" "$MERGE_HASH" | grep '^Genesis-Commit: ' | sed 's/^Genesis-Commit: //' || true)
            if [ -n "$COMMIT_LINE" ]; then
              COMMIT_LINE=$(echo "$COMMIT_LINE" | jq -c '
                .id as $head | .comparisonTargets as $targets | ($targets + [$head]) as $all |
                .reviews |= [.[] |
                  .difficultyRanking |= [.[] | . as $h | if ($h | length) < 40 then ($all[] | select(startswith($h))) // $h else . end] |
                  .noveltyRanking |= [.[] | . as $h | if ($h | length) < 40 then ($all[] | select(startswith($h))) // $h else . end] |
                  .designQualityRanking |= [.[] | . as $h | if ($h | length) < 40 then ($all[] | select(startswith($h))) // $h else . end]
                ]')
              SIGNED_COMMITS=$(echo "$SIGNED_COMMITS" | jq --argjson c "$COMMIT_LINE" '. + [$c]')
            fi
          done
          NEW_RANKING=$(jq -n --argjson sc "$SIGNED_COMMITS" --argjson idx "$UPDATED_CACHE" \
            '{signedCommits: $sc, indices: $idx}' | .lake/build/bin/genesis_ranking | jq -c '.ranking')
          NEW_COMMIT_HASH=$(echo "$INDEX" | jq -r '.commitHash')

          # Update ranking.json: add new entry keyed by the new commit hash
          EXISTING_RANKING=$(git show origin/genesis-state:ranking.json 2>/dev/null || echo '{}')
          UPDATED_RANKING=$(echo "$EXISTING_RANKING" | jq --arg key "$NEW_COMMIT_HASH" --argjson val "$NEW_RANKING" '. + {($key): $val}')

          # Push both to genesis-state
          git fetch origin genesis-state
          git worktree add /tmp/genesis-state origin/genesis-state
          git -C /tmp/genesis-state checkout -B genesis-state origin/genesis-state
          echo "$UPDATED_CACHE" > /tmp/genesis-state/genesis.json
          echo "$UPDATED_RANKING" > /tmp/genesis-state/ranking.json
          git -C /tmp/genesis-state config user.name "JAR Bot"
          git -C /tmp/genesis-state config user.email "legal@bitarray.dev"
          git -C /tmp/genesis-state add genesis.json ranking.json
          git -C /tmp/genesis-state commit -m "genesis: update state for PR #${PR_NUMBER}"
          git -C /tmp/genesis-state push origin genesis-state
          git worktree remove /tmp/genesis-state

      - name: Verify cache integrity
        working-directory: spec
        run: |
          git pull origin master --ff-only
          bash tools/genesis-replay.sh --verify-cache
