name: "Genesis: Review Check"

on:
  issue_comment:
    types: [created]

jobs:
  check-review:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/genesis-review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_AUTHOR=$(gh pr view ${{ github.event.issue.number }} --json author --jq '.author.login')
          CHANGED=$(gh pr diff ${{ github.event.issue.number }} --name-only)
          if echo "$CHANGED" | grep -qE '^\.github/(workflows/genesis-|cache/genesis\.json)'; then
            if [ "$PR_AUTHOR" != "sorpaas" ]; then
              echo "Protected files modified by non-founder — skipping genesis review"
              exit 0
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-genesis-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build genesis tools
        run: lake build genesis_check_merge

      - name: Collect all reviews and check merge readiness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          CACHE=$(cat .github/cache/genesis.json)

          to_json_array() { echo "$1" | tr ',' '\n' | jq -R . | jq -s .; }

          parse_review() {
            local BODY="$1"
            local AUTHOR="$2"
            local DIFF=$(echo "$BODY" | grep -i '^difficulty:' | sed 's/^difficulty:\s*//' | tr -d ' ')
            local NOV=$(echo "$BODY" | grep -i '^novelty:' | sed 's/^novelty:\s*//' | tr -d ' ')
            local DES=$(echo "$BODY" | grep -i '^design:' | sed 's/^design:\s*//' | tr -d ' ')
            local VERD=$(echo "$BODY" | grep -i '^verdict:' | sed 's/^verdict:\s*//' | tr -d ' ')
            if [ -n "$DIFF" ] && [ -n "$NOV" ] && [ -n "$DES" ] && [ -n "$VERD" ]; then
              jq -n \
                --arg reviewer "$AUTHOR" \
                --argjson diff "$(to_json_array "$DIFF")" \
                --argjson nov "$(to_json_array "$NOV")" \
                --argjson des "$(to_json_array "$DES")" \
                --arg verdict "$VERD" \
                '{reviewer: $reviewer, difficultyRanking: $diff, noveltyRanking: $nov, designQualityRanking: $des, verdict: $verdict}'
            fi
          }

          # Scan ALL /genesis-review comments on this PR (last review per author wins)
          REVIEWS="[]"
          while IFS= read -r comment; do
            [ -z "$comment" ] && continue
            BODY=$(echo "$comment" | jq -r '.body')
            REVIEWER=$(echo "$comment" | jq -r '.author.login')
            REVIEW=$(parse_review "$BODY" "$REVIEWER")
            if [ -n "$REVIEW" ]; then
              REVIEWS=$(echo "$REVIEWS" | jq --arg r "$REVIEWER" --argjson rev "$REVIEW" \
                '[.[] | select(.reviewer != $r)] + [$rev]')
            fi
          done <<< "$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | startswith("/genesis-review"))')"

          REVIEW_COUNT=$(echo "$REVIEWS" | jq 'length')
          if [ "$REVIEW_COUNT" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --body "**JAR Bot:** Could not parse any reviews. Please check the format."
            exit 0
          fi

          # Check merge readiness
          INPUT=$(jq -n \
            --argjson reviews "$REVIEWS" \
            --argjson indices "$CACHE" \
            '{reviews: $reviews, metaReviews: [], indices: $indices}')

          RESULT=$(echo "$INPUT" | .lake/build/bin/genesis_check_merge)

          READY=$(echo "$RESULT" | jq -r '.ready')
          MERGE_W=$(echo "$RESULT" | jq -r '.mergeWeight')
          TOTAL_W=$(echo "$RESULT" | jq -r '.totalWeight')

          if [ "$READY" = "true" ]; then
            gh pr comment "$PR_NUMBER" --body \
              "**JAR Bot:** Review recorded from @${COMMENT_AUTHOR} (${REVIEW_COUNT} total reviews).
              Merge weight: ${MERGE_W}/${TOTAL_W}. Quorum reached — merging."

            # Trigger the merge workflow
            gh workflow run genesis-merge.yml \
              -f pr_number="$PR_NUMBER"
          else
            gh pr comment "$PR_NUMBER" --body \
              "**JAR Bot:** Review recorded from @${COMMENT_AUTHOR} (${REVIEW_COUNT} total reviews).
              Merge weight: ${MERGE_W}/${TOTAL_W} (need >50%)."
          fi
